# Databricks Apps manifest — deploy with: databricks apps deploy ekc-app .
name: ekc-app
description: Enterprise Knowledge Copilot — hybrid retrieval over SOPs, tickets, logs, graph
command:
  - streamlit
  - run
  - app/app.py
  - --server.port=8000
  - --server.address=0.0.0.0
  - --server.headless=true
  - --browser.gatherUsageStats=false

env:
  - name: VS_ENDPOINT
    value: hackathon_vs_endpoint
  - name: VS_INDEX
    value: dev_digital_engineering_services.hackathon.gold_knowledge_chunks_idx
  - name: LLM_ENDPOINT
    value: databricks-claude-sonnet-4-6
  - name: FEEDBACK_TABLE
    value: dev_digital_engineering_services.hackathon.user_feedback
  # NOTE: replace <YOUR_SECRET_SCOPE> below with your actual scope name
  # (the one passed to `databricks secrets create-scope`). Example: hackathon
  - name: NEO4J_URI
    valueFrom: <YOUR_SECRET_SCOPE>/neo4j_uri
  - name: NEO4J_USER
    valueFrom: <YOUR_SECRET_SCOPE>/neo4j_user
  - name: NEO4J_PASSWORD
    valueFrom: <YOUR_SECRET_SCOPE>/neo4j_password
  - name: ANTHROPIC_API_KEY
    valueFrom: <YOUR_SECRET_SCOPE>/anthropic_api_key
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: <YOUR_SECRET_SCOPE>/warehouse_id
